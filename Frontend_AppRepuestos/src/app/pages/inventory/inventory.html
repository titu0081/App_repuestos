<section class="inventoryCabecera">
  <div class="d-flex justify-content-between gap-2 flex-wrap">
    <h1>Inventario</h1>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary" (click)="goFormInventory()">
        <i class="bi bi-plus-circle"></i> Crear inventario
      </button>
      <!-- <button class="btn btn-outline-secondary">Exportar</button> -->
    </div>
  </div>
</section>

<section class="inventoryBody d-flex flex-column gap-3">
  <div class="table-responsive tableInventory">
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th># Fila</th>
          <th>SKU</th>
          <th>Nombre repuesto/pieza</th>
          <th>Descripción</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        @if(inventario.length === 0) {
        <tr>
          <td colspan="5" class="text-center">No hay inventario disponible</td>
        </tr>
        } @else{ @for (item of inventario; let fila = $index;track item.id) {
        <tr>
          <td>{{ fila +1 }}</td>
          <td>{{ item.sku }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.description }}</td>
          <td class="text-center">
            <div class="d-flex gap-2 align-items-center justify-content-center">
              <button
                class="btn btn-sm btn-outline-primary"
                data-bs-toggle="tooltip"
                title="Editar"
                (click)="editInventory(item)"
              >
                <i class="bi bi-pencil-square"></i>
              </button>
              <button
                class="btn btn-sm btn-outline-danger"
                data-bs-toggle="tooltip"
                title="Eliminar"
                (click)="deleteInventory(item)"
              >
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
        } }
      </tbody>
    </table>
  </div>
</section>
