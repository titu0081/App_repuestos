<div
  class="container min-vh-100 d-flex align-items-center justify-content-center py-4"
>
  <div class="card shadow-sm border-0">
    <div class="card-body p-4 p-md-5">
      <h1 class="h4 fw-bold mb-1">Iniciar sesión</h1>
      <p class="text-secondary mb-4">Accede para continuar a la aplicación.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Correo</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            placeholder="correo@ejemplo.com"
          />
          @if (email?.touched && email?.invalid) {
          <div class="text-danger small mt-1">Ingresa un correo válido.</div>
          }
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input
            id="password"
            type="password"
            class="form-control"
            formControlName="password"
            placeholder="********"
          />
          @if (password?.touched && password?.invalid) {
          <div class="text-danger small mt-1">
            La contraseña es obligatoria (mínimo 4).
          </div>
          }
        </div>

        @if (loginError) {
        <div class="alert alert-danger py-2" role="alert">{{ loginError }}</div>
        }

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
      </form>

      <div class="text-center mt-3 small">
        ¿No tienes cuenta?
        <a routerLink="/auth/register" class="text-decoration-none"
          >Regístrate</a
        >
      </div>
    </div>
  </div>
</div>
